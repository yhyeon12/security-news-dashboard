<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Security News Dashboard</title>
  <link rel="stylesheet" href="./css/main.css">
  <script src="./js/main.js" defer></script>
</head>
<body>
  <h1>Security News Dashboard</h1>
  <p>보안 기술 동향 확인 및 
  보안사고, CVE 취약점, 정보유출 사례 정리</p>

  <div class="filter">
    <button onclick="filterNews('전체')">전체</button>
    <button onclick="filterNews('정보유출')">유출</button>
    <button onclick="filterNews('CVE')">CVE</button>
    <button onclick="filterNews('랜섬웨어')">랜섬웨어</button>
    <button onclick="filterNews('보안사고')">보안사고</button>
    <button onclick="filterNews('보안동향')">보안동향</button>
  </div>

  <div class="container" id="newsContainer"></div>
</body>
</html>
